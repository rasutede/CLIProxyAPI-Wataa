name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: cli-proxy-api
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: cli-proxy-api
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: cli-proxy-api.exe
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        shell: bash
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        env:
          GOOS: ""
          GOARCH: ""
        run: go vet ./...

      - name: Build binary
        shell: bash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags "-s -w -X 'main.Version=dev' -X 'main.Commit=${COMMIT}' -X 'main.BuildDate=${BUILD_DATE}'" \
            -o dist/${{ matrix.binary }} ./cmd/server/

      - name: Verify binary
        shell: bash
        run: |
          ls -lh dist/${{ matrix.binary }}
          file dist/${{ matrix.binary }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-proxy-api-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.binary }}
          retention-days: 7
